# The authority database remains service-private. Client journals are isolated
# per UID below a traversable, non-writable host-standard parent.
d /var/lib/devcoordinator 0700 root root -
d /var/lib/devcoordinator-clients 0711 root root -
d /run/devcoordinator 0750 root devcoordinator-clients -
d /etc/devcoordinator 0750 root devcoordinator-clients -
