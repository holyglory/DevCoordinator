name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  non-native-validation:
    name: Non-native validation (${{ matrix.os }}, Python ${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        python: ["3.9", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Check out repository with reachable history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ci/playwright/package-lock.json

      - name: Verify locked browser dependency tree
        run: npm ci --ignore-scripts --prefix ci/playwright

      - name: Install Linux process probes
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends lsof procps util-linux

      - name: Capture coordinator inventory before test listeners
        run: >-
          python3 skills/codex-dev-coordinator/scripts/dev_coordinator.py
          inventory --project "$GITHUB_WORKSPACE"
          > "$RUNNER_TEMP/devcoordinator-inventory.json"

      - name: Run complete safe validation
        run: python3 scripts/validate.py --skip-macos-app

      - name: Prove split-service capability registration and non-propagation
        if: runner.os == 'Linux'
        env:
          COORDINATOR_CAPABILITY_INTEGRATION_INVENTORY_CHECKED: "1"
          COORDINATOR_CAPABILITY_INTEGRATION_REQUIRED: "1"
        run: python3 skills/codex-dev-coordinator/scripts/capability_integration_test.py

  postgres-docker-integration:
    name: Disposable PostgreSQL Docker integration
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Inventory before Docker mutation
        run: >-
          python3 skills/codex-dev-coordinator/scripts/dev_coordinator.py
          inventory --project "$GITHUB_WORKSPACE"
          > "$RUNNER_TEMP/devcoordinator-inventory.json"

      - name: Run disposable integration
        env:
          POSTGRES_BACKUP_INTEGRATION_IMAGE: postgres:16-alpine
          POSTGRES_BACKUP_INTEGRATION_INVENTORY_CHECKED: "1"
          POSTGRES_BACKUP_INTEGRATION_REQUIRED: "1"
        run: |
          set -euo pipefail
          docker pull "$POSTGRES_BACKUP_INTEGRATION_IMAGE"
          python3 skills/postgres-docker-backup/scripts/integration_test.py

  native-policy-boundary:
    name: Native gate policy boundary
    runs-on: macos-14
    steps:
      - name: Explain native acceptance ownership
        run: >-
          echo 'DevOps Board build, XCTest, snapshots, packaging, launch, and
          native UI acceptance must run through Build macOS Apps; this workflow
          does not substitute direct Swift/Xcode commands.'
